<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astoria Lead Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      width: 100%;
      max-width: 780px;
      margin-bottom: 28px;
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      letter-spacing: -0.3px;
    }

    header p {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #64748b;
    }

    .card {
      width: 100%;
      max-width: 780px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-header svg {
      flex-shrink: 0;
    }

    .card-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
    }

    .card-header p {
      font-size: 0.78rem;
      color: #bfdbfe;
      margin-top: 2px;
    }

    .iframe-wrap {
      width: 100%;
    }

    iframe {
      display: block;
      width: 100%;
      height: 860px;
      border: none;
    }

    footer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <header>
    <h1>Apply Now</h1>
    <p>Fill out the form below and we'll match you with the best offers available.</p>
  </header>

  <div class="card">
    <div class="iframe-wrap">
      <iframe
        src="https://reports.astoriacompany.com/forms/46e3dcfb-5a5f-40fc-bf4c-cd16097ee278?vendor_id=GITHUB_TEST&sub_id=gh-pages&lead_mode=0"
        title="Home Improvement Lead Form"
        loading="lazy"
        allow="clipboard-write"
      ></iframe>
    </div>
  </div>

  <footer>Astoria Company &copy; 2026 &mdash; Embedded form test</footer>

</body>
</html>
