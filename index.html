<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply Now</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      width: 100%;
      max-width: 780px;
      margin-bottom: 28px;
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      letter-spacing: -0.3px;
    }

    .card {
      width: 100%;
      max-width: 780px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 860px;
      border: none;
    }

    footer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <header>
    <h1>Apply Now</h1>
  </header>

  <div class="card">
    <iframe
      src="https://reports.astoriacompany.com/forms/46e3dcfb-5a5f-40fc-bf4c-cd16097ee278?vendor_id=GITHUB_TEST&sub_id=gh-pages&lead_mode=0"
      title="Lead Application"
      loading="lazy"
      allow="clipboard-write"
    ></iframe>
  </div>

  <footer>Astoria Company &copy; 2026</footer>

</body>
</html>
