<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply Now</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      height: 100vh;
      display: flex;
      gap: 20px;
      padding: 24px;
    }

    .form-side {
      flex: 1;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      overflow: hidden;
      min-width: 0;
    }

    .form-side iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    .tester-side {
      width: 300px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tester-side h2 {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }

    textarea {
      flex: 1;
      width: 100%;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.76rem;
      font-family: monospace;
      line-height: 1.6;
      color: #1e293b;
      background: #f8fafc;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #3b82f6; background: #fff; }

    .btn {
      width: 100%;
      height: 36px;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-ghost { background: #f1f5f9; color: #475569; }
    .btn-ghost:hover { background: #e2e8f0; }
  </style>
</head>
<body>

  <div class="form-side">
    <iframe id="formFrame" src="" title="Lead Application"></iframe>
  </div>

  <div class="tester-side">
    <h2>Embed Code</h2>
    <textarea id="embedCode"><iframe
  src="https://reports.astoriacompany.com/forms/46e3dcfb-5a5f-40fc-bf4c-cd16097ee278?vendor_id=YOUR_VID&sub_id=YOUR_SUB&lead_mode=0&dev_mode=true"
  width="100%"
  height="800"
  frameborder="0"
></iframe></textarea>
    <button class="btn btn-primary" onclick="loadForm()">Load</button>
    <button class="btn btn-ghost" onclick="copyCode()" id="copyBtn">Copy</button>
  </div>

<script>
  function extractSrc(code) {
    const m = code.match(/src=["']([^"']+)["']/)
    return m ? m[1] : null
  }

  function loadForm() {
    const src = extractSrc(document.getElementById('embedCode').value)
    if (src) document.getElementById('formFrame').src = src
  }

  function copyCode() {
    navigator.clipboard.writeText(document.getElementById('embedCode').value)
    const btn = document.getElementById('copyBtn')
    btn.textContent = 'Copied!'
    setTimeout(() => btn.textContent = 'Copy', 1500)
  }

  loadForm()
</script>
</body>
</html>
