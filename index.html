<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply Now</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      gap: 20px;
    }

    header {
      width: 100%;
      max-width: 860px;
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      letter-spacing: -0.3px;
    }

    /* ── Tester Panel ── */
    .tester {
      width: 100%;
      max-width: 860px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      padding: 20px 24px;
    }

    .tester h2 {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 0.72rem;
      font-weight: 500;
      color: #475569;
    }

    .field input, .field select {
      height: 36px;
      padding: 0 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #1e293b;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus, .field select:focus {
      border-color: #3b82f6;
      background: #fff;
    }

    .field.grow { flex: 1; min-width: 180px; }

    .btn {
      height: 36px;
      padding: 0 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-ghost { background: #f1f5f9; color: #475569; }
    .btn-ghost:hover { background: #e2e8f0; }

    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 16px 0 14px;
    }

    .quick-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 8px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #334155;
      transition: all 0.15s;
    }

    .chip:hover { background: #e0f2fe; border-color: #7dd3fc; color: #0369a1; }
    .chip.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

    /* ── iframe card ── */
    .card {
      width: 100%;
      max-width: 860px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .card-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }

    .card-bar .url-pill {
      font-size: 0.72rem;
      color: #64748b;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 600px;
    }

    iframe {
      display: block;
      width: 100%;
      height: 880px;
      border: none;
    }

    footer {
      font-size: 0.72rem;
      color: #94a3b8;
      padding-bottom: 16px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Apply Now</h1>
  </header>

  <!-- Tester panel -->
  <div class="tester">
    <h2>Form Tester</h2>

    <div class="row">
      <div class="field grow">
        <label>Base URL</label>
        <select id="baseUrl">
          <option value="https://reports.astoriacompany.com">reports.astoriacompany.com (production)</option>
          <option value="http://localhost:3000">localhost:3000 (local)</option>
        </select>
      </div>
      <div class="field grow">
        <label>Form Token</label>
        <input id="token" type="text" placeholder="paste form token or full URL" value="46e3dcfb-5a5f-40fc-bf4c-cd16097ee278" />
      </div>
    </div>

    <div class="row" style="margin-top:10px;">
      <div class="field">
        <label>vendor_id</label>
        <input id="vendorId" type="text" style="width:130px;" placeholder="YOUR_VID" />
      </div>
      <div class="field">
        <label>sub_id</label>
        <input id="subId" type="text" style="width:110px;" placeholder="YOUR_SUB" />
      </div>
      <div class="field">
        <label>tier</label>
        <select id="tier" style="width:90px;">
          <option value="">ALL</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </div>
      <div class="field">
        <label>lead_mode</label>
        <select id="leadMode" style="width:100px;">
          <option value="0">0 — test</option>
          <option value="1">1 — live</option>
        </select>
      </div>
      <div class="field">
        <label>dev_mode</label>
        <select id="devMode" style="width:90px;">
          <option value="true">on</option>
          <option value="">off</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="loadForm()">Load Form</button>
      <button class="btn btn-ghost" onclick="resetFields()">Reset</button>
    </div>

    <hr class="divider" />

    <div class="quick-label">Quick load</div>
    <div class="chips" id="chips"></div>
  </div>

  <!-- iframe card -->
  <div class="card">
    <div class="card-bar">
      <span class="url-pill" id="urlPill">—</span>
      <button class="btn btn-ghost" style="height:28px;font-size:0.72rem;padding:0 10px;" onclick="openTab()">Open in tab ↗</button>
    </div>
    <iframe id="formFrame" src="" title="Lead Application"></iframe>
  </div>

  <footer>Astoria Company &copy; 2026</footer>

<script>
  const SAVED_KEY = 'ast_quick_tokens'

  const DEFAULTS = [
    { label: 'Production form', token: '46e3dcfb-5a5f-40fc-bf4c-cd16097ee278', base: 'https://reports.astoriacompany.com' },
  ]

  function buildUrl() {
    let raw = document.getElementById('token').value.trim()
    const base = document.getElementById('baseUrl').value

    // If user pasted a full URL, extract just the token
    const match = raw.match(/\/forms\/([a-f0-9-]+)/i)
    if (match) raw = match[1]

    const params = new URLSearchParams()
    const vid = document.getElementById('vendorId').value.trim()
    const sub = document.getElementById('subId').value.trim()
    const tier = document.getElementById('tier').value
    const mode = document.getElementById('leadMode').value
    const dev  = document.getElementById('devMode').value

    if (vid)  params.set('vendor_id', vid)
    if (sub)  params.set('sub_id', sub)
    if (tier) params.set('tier', tier)
    if (mode !== '') params.set('lead_mode', mode)
    if (dev)  params.set('dev_mode', dev)

    const qs = params.toString()
    return `${base}/forms/${raw}${qs ? '?' + qs : ''}`
  }

  function loadForm() {
    const url = buildUrl()
    document.getElementById('formFrame').src = url
    document.getElementById('urlPill').textContent = url
    saveQuick()
    renderChips()
  }

  function openTab() {
    window.open(buildUrl(), '_blank')
  }

  function resetFields() {
    document.getElementById('vendorId').value = ''
    document.getElementById('subId').value = ''
    document.getElementById('tier').value = ''
    document.getElementById('leadMode').value = '0'
    document.getElementById('devMode').value = 'true'
  }

  // ── Quick tokens (persisted in localStorage) ──
  function getQuick() {
    try { return JSON.parse(localStorage.getItem(SAVED_KEY) || '[]') } catch { return [] }
  }

  function saveQuick() {
    const token = document.getElementById('token').value.trim().replace(/.*\/forms\//, '')
    if (!token) return
    const base  = document.getElementById('baseUrl').value
    const label = token.slice(0, 8) + '…'
    const existing = getQuick()
    if (existing.find(q => q.token === token)) return
    existing.unshift({ label, token, base })
    if (existing.length > 8) existing.pop()
    localStorage.setItem(SAVED_KEY, JSON.stringify(existing))
  }

  function renderChips() {
    const all = [...DEFAULTS, ...getQuick().filter(q => !DEFAULTS.find(d => d.token === q.token))]
    const container = document.getElementById('chips')
    container.innerHTML = ''
    const currentToken = document.getElementById('token').value.trim().replace(/.*\/forms\//, '')
    all.forEach(q => {
      const chip = document.createElement('button')
      chip.className = 'chip' + (q.token === currentToken ? ' active' : '')
      chip.textContent = q.label
      chip.onclick = () => {
        document.getElementById('token').value = q.token
        document.getElementById('baseUrl').value = q.base
        loadForm()
      }
      container.appendChild(chip)
    })
  }

  // Auto-load on start
  renderChips()
  loadForm()
</script>
</body>
</html>
